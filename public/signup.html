<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — Iris</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.09);
        --borderhi: rgba(255, 255, 255, 0.22);
        --text: #f0f0f0;
        --muted: #666;
        --input-bg: rgba(255, 255, 255, 0.03);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        font-family: "Instrument Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 70% 50% at 15% 10%,
            rgba(255, 255, 255, 0.025) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 55% 45% at 85% 90%,
            rgba(255, 255, 255, 0.02) 0%,
            transparent 55%
          );
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.022) 1px,
            transparent 1px
          );
        background-size: 80px 80px;
        pointer-events: none;
      }
      .wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 520px;
        animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .wordmark {
        text-align: center;
        margin-bottom: 2.4rem;
      }
      .wordmark h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: 2.1rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fff;
      }
      .wordmark p {
        margin-top: 0.25rem;
        font-size: 0.64rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .card {
        background: var(--surface);
        backdrop-filter: blur(28px) saturate(150%);
        -webkit-backdrop-filter: blur(28px) saturate(150%);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 2.8rem 2.6rem;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.025) inset,
          0 48px 96px rgba(0, 0, 0, 0.65);
      }

      /* Steps */
      .steps {
        display: flex;
        align-items: center;
        margin-bottom: 2.2rem;
        gap: 0;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        flex: 1;
      }
      .step-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.25);
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .step.active .step-num {
        border-color: rgba(255, 255, 255, 0.7);
        color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.06);
      }
      .step-lbl {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.2);
        font-weight: 500;
      }
      .step.active .step-lbl {
        color: rgba(255, 255, 255, 0.5);
      }
      .step-line {
        flex: 1;
        height: 1px;
        background: var(--border);
        margin: 0 0.6rem;
      }

      .card-head {
        padding-bottom: 2rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
      }
      .eyebrow {
        font-size: 0.63rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.65rem;
        font-weight: 500;
      }
      .card-head h2 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 400;
        font-size: 1.85rem;
        line-height: 1.15;
        color: #fff;
      }
      .card-head h2 em {
        font-style: italic;
        font-weight: 300;
      }
      .card-head p {
        margin-top: 0.55rem;
        font-size: 0.8rem;
        color: var(--muted);
        line-height: 1.65;
      }

      /* App banner */
      .app-banner {
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 0.8rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-bottom: 1.8rem;
        background: rgba(255, 255, 255, 0.025);
      }
      .app-mono {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cormorant Garamond", serif;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.5);
        flex-shrink: 0;
      }
      .app-banner p {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .app-banner strong {
        font-size: 0.84rem;
        color: var(--text);
        font-weight: 600;
        display: block;
        margin-top: 0.1rem;
      }

      /* Social */
      .social-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .social-btn {
        flex: 1;
        padding: 0.65rem 0.5rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--muted);
        font-family: "Instrument Sans", sans-serif;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        text-align: center;
      }
      .social-btn:hover {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
      }
      .or-divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.3rem 0;
        font-size: 0.67rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.18);
      }
      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Fields */
      .field-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }
      .field {
        margin-bottom: 1.1rem;
      }
      .field-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.4rem;
      }
      .field-top label {
        font-size: 0.66rem;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 0.72rem 0.9rem;
        color: var(--text);
        font-family: "Instrument Sans", sans-serif;
        font-size: 0.86rem;
        outline: none;
        transition:
          border-color 0.18s,
          background 0.18s,
          box-shadow 0.18s;
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.16);
      }
      input:focus {
        border-color: var(--borderhi);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
      }
      .pw-wrap {
        position: relative;
      }
      .pw-toggle {
        position: absolute;
        right: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.22);
        font-family: "Instrument Sans", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: color 0.15s;
        padding: 0;
      }
      .pw-toggle:hover {
        color: rgba(255, 255, 255, 0.5);
      }

      /* Strength */
      .strength-track {
        height: 2px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 99px;
        margin-top: 0.45rem;
        overflow: hidden;
      }
      .strength-fill {
        height: 100%;
        border-radius: 99px;
        width: 0;
        background: rgba(255, 255, 255, 0.5);
        transition:
          width 0.35s,
          background 0.35s;
      }
      .strength-hint {
        font-size: 0.69rem;
        color: rgba(255, 255, 255, 0.22);
        margin-top: 0.3rem;
      }

      /* Terms */
      .terms-row {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
        cursor: pointer;
        user-select: none;
      }
      .terms-row input {
        display: none;
      }
      .chk {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        margin-top: 1px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.55rem;
        color: #0a0a0a;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .chk.checked {
        background: rgba(255, 255, 255, 0.75);
        border-color: rgba(255, 255, 255, 0.75);
      }
      .terms-text {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.28);
        line-height: 1.6;
      }
      .terms-text a {
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        transition: color 0.15s;
      }
      .terms-text a:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      .btn {
        width: 100%;
        padding: 0.88rem;
        background: #fff;
        border: none;
        border-radius: 2px;
        color: #0a0a0a;
        font-family: "Instrument Sans", sans-serif;
        font-weight: 600;
        font-size: 0.78rem;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.18s,
          transform 0.12s,
          box-shadow 0.18s;
      }
      .btn:hover {
        background: #e6e6e6;
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
      }
      .btn:active {
        transform: translateY(0);
      }

      .foot {
        margin-top: 1.4rem;
        text-align: center;
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.2);
      }
      .foot a {
        color: rgba(255, 255, 255, 0.38);
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: color 0.15s;
      }
      .foot a:hover {
        color: rgba(255, 255, 255, 0.65);
      }
      .error-banner {
        display: none;
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.25);
        border-radius: 2px;
        padding: 0.7rem 0.9rem;
        margin-bottom: 1.2rem;
        font-size: 0.78rem;
        color: rgba(255, 120, 120, 0.9);
        letter-spacing: 0.03em;
        animation: rise 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .error-banner.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="wordmark">
        <h1>Iris</h1>
        <p>Identity &amp; Access Platform</p>
      </div>
      <div class="card">
        <!-- Steps -->
        <div class="steps">
          <div class="step active">
            <div class="step-num">1</div>
            <span class="step-lbl">Account</span>
          </div>
          <div class="step-line"></div>
          <div class="step">
            <div class="step-num">2</div>
            <span class="step-lbl">Verify</span>
          </div>
          <div class="step-line"></div>
          <div class="step">
            <div class="step-num">3</div>
            <span class="step-lbl">Access</span>
          </div>
        </div>

        <div class="card-head">
          <div class="eyebrow">New Account</div>
          <h2>Create <em>account</em></h2>
          <p>
            Sign up for Iris to get secure access across all connected
            applications.
          </p>
        </div>

        <div class="app-banner">
          <div class="app-mono">A</div>
          <div>
            <p>Creating account to access</p>
            <strong id="appName"></strong>
          </div>
        </div>

        <!-- <div class="social-row">
      <button class="social-btn">Google</button>
      <button class="social-btn">Apple</button>
      <button class="social-btn">GitHub</button>
    </div>

    <div class="or-divider">or</div> -->

        <div class="error-banner" id="errorBanner"></div>

        <form onsubmit="handleSignup(event)">
          <div class="field-row-2">
            <div class="field">
              <div class="field-top"><label>First Name</label></div>
              <input
                type="text"
                id="firstName"
                placeholder="Shreyash"
                required
                autocomplete="given-name"
              />
            </div>
            <div class="field">
              <div class="field-top"><label>Last Name</label></div>
              <input
                type="text"
                id="lastName"
                placeholder="Koshta"
                autocomplete="family-name"
              />
            </div>
          </div>

          <div class="field">
            <div class="field-top">
              <label for="email">Email Address</label>
            </div>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <!-- <div class="field">
            <div class="field-top"><label for="username">Username</label></div>
            <input
              type="text"
              id="username"
              placeholder="alexmorgan"
              required
              autocomplete="username"
            />
          </div> -->

          <div class="field">
            <div class="field-top"><label for="pw1">Password</label></div>
            <div class="pw-wrap">
              <input
                type="password"
                id="pw1"
                placeholder="Create a strong password"
                required
                oninput="checkStrength(this)"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePwd('pw1', this)"
              >
                Show
              </button>
            </div>
            <div class="strength-track">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-hint" id="strengthHint">Enter a password</div>
          </div>

          <div class="field">
            <div class="field-top">
              <label for="pw2">Confirm Password</label>
            </div>
            <div class="pw-wrap">
              <input
                type="password"
                id="pw2"
                placeholder="Repeat your password"
                required
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePwd('pw2', this)"
              >
                Show
              </button>
            </div>
          </div>

          <!-- <label class="terms-row" onclick="toggleTerms(this)">
            <input type="checkbox" id="termsChk" required />
            <span class="chk" id="termsBox"></span>
            <span class="terms-text"
              >I agree to Iris's <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>.</span
            >
          </label> -->

          <button type="submit" class="btn" id="signupBtn">
            Create Account
          </button>
        </form>

        <div class="foot">
          Already have an account? <a href="/auth/authenticate">Sign in</a>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("clientId");
      const state = params.get("state");
      const nonce = params.get("nonce");

      async function loadClientData() {
        if (!clientId) {
          document.querySelector("#appName").textContent = "Unknown App";
        }

        try {
          const res = await fetch(`/auth/client-metadata?clientId=${clientId}`);

          const result = await res.json();

          if (result.success && result.data) {
            const appName = result.data.name;
            document.querySelector("#appName").textContent = appName;
            document.querySelector(".app-mono").textContent = appName
              .charAt(0)
              .toUpperCase();
          }
        } catch (error) {
          console.log(error.message);
          document.querySelector("#appName").textContent = clientId;
        }
      }

      loadClientData();

      const signinLink = document.querySelector(".foot a");
      signinLink.href = clientId
        ? `/auth/authenticate?clientId=${clientId}`
        : "/auth/authenticate";

      function showError(msg) {
        const banner = document.getElementById("errorBanner");
        banner.textContent = msg;
        banner.classList.add("visible");
      }

      function clearError() {
        const banner = document.getElementById("errorBanner");
        banner.textContent = "";
        banner.classList.remove("visible");
      }

      function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        inp.type = inp.type === "password" ? "text" : "password";
        btn.textContent = inp.type === "password" ? "Show" : "Hide";
      }

      function checkStrength(input) {
        const v = input.value;
        let s = 0;
        if (v.length >= 8) s++;
        if (v.length >= 12) s++;
        if (/[A-Z]/.test(v)) s++;
        if (/[0-9]/.test(v)) s++;
        if (/[^A-Za-z0-9]/.test(v)) s++;
        const fill = document.getElementById("strengthFill");
        const hint = document.getElementById("strengthHint");
        const pct = ["0%", "20%", "40%", "60%", "80%", "100%"][Math.min(s, 5)];
        const labels = [
          "Enter a password",
          "Very weak",
          "Weak",
          "Fair",
          "Strong",
          "Very strong",
        ];
        const opacities = ["0.15", "0.3", "0.4", "0.55", "0.75", "0.9"];
        fill.style.width = pct;
        fill.style.opacity = opacities[Math.min(s, 5)];
        hint.textContent = labels[Math.min(s, 5)];
      }

      // function toggleTerms(el) {
      //   const cb = el.querySelector("input");
      //   const box = document.getElementById("termsBox");
      //   const nowChecked = !cb.checked;
      //   box.classList.toggle("checked", nowChecked);
      //   box.textContent = nowChecked ? "✓" : "";
      // }

      async function handleSignup(e) {
        e.preventDefault();
        clearError();

        const p1 = document.getElementById("pw1").value;
        const p2 = document.getElementById("pw2").value;

        if (p1 !== p2) {
          showError("Passwords do not match");
          return;
        }

        const btn = document.getElementById("signupBtn");
        btn.textContent = "Creating account...";
        btn.style.opacity = "0.55";
        btn.disabled = true;

        try {
          const res = await fetch("/auth/authenticate/sign-up", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              firstName: document.getElementById("firstName").value,
              lastName: document.getElementById("lastName").value || undefined,
              email: document.getElementById("email").value,
              password: p1,
            }),
          });

          const body = await res.json();
          if (!res.ok) throw new Error(body.error || "Signup failed");

          // account created — redirect to login with clientId
          btn.textContent = "Account created — signing you in...";
          btn.style.background = "#d8d8d8";

          setTimeout(() => {
            window.location.href = clientId
              ? `/auth/authenticate?clientId=${clientId}`
              : "/auth/authenticate";
          }, 1000);
        } catch (error) {
          btn.textContent = "Create Account";
          btn.style.opacity = "1";
          btn.disabled = false;
          showError(error.message);
        }
      }
    </script>
  </body>
</html>
